# Netlify build config for Beyond the Arc.
#
# The data pipeline (`npm run sync:* + npm run export:data`) runs LOCALLY
# against Supabase + CBB Analytics and writes pre-built JSON into public/data.
# Those files are committed to the repo, so Netlify only needs to run the
# framework build to turn React + JSON into HTML.

[build]
  # Production deploys are MANUAL from a local machine: run
  # `node scripts/build-with-r2-stash.mjs` then
  # `netlify deploy --prod --dir=out`. Netlify's hosted build runner
  # times out on this project's ~23k static pages even after
  # optimization — local builds (no cap) are the only reliable path.
  #
  # We still keep the build command set in case someone manually
  # triggers a deploy from the dashboard, but the `ignore` rule below
  # skips Netlify's automatic build on push so failing CI doesn't burn
  # build minutes.
  command   = "node scripts/build-with-r2-stash.mjs"
  publish   = "out"
  # Exit 0 = "no changes worth deploying" = Netlify skips the build.
  # Auto-deploys on git push become no-ops; the live site stays on the
  # last manual `netlify deploy --prod` snapshot. To re-enable auto-
  # deploys, change this to `exit 1` (or remove the line) and pray the
  # 18-min build cap holds.
  ignore    = "exit 0"

[build.environment]
  NODE_VERSION = "20"
  # Skip Next telemetry to keep build logs clean
  NEXT_TELEMETRY_DISABLED = "1"

# Long-term cache the immutable Next.js asset bundles. The hashed filenames
# already bust the cache on any change.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Photos + team logos are big and rarely change — give them a year of edge cache.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JSON data files change on each export — let edges revalidate.
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=600, stale-while-revalidate=86400"

# Per-player + per-team JSONs (sharded under /data/...) follow the same rule.
[[headers]]
  for = "/data/*/*.json"
  [headers.values]
    Cache-Control = "public, max-age=600, stale-while-revalidate=86400"
